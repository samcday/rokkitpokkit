name: COPR (main)
run-name: COPR main build (${{ github.sha }})

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - copr/**
      - packit.yaml
      - scripts/packit-fetch-source.sh
      - .github/workflows/copr-main.yml

permissions:
  contents: read

env:
  COPR_TARGETS: fedora-rawhide-aarch64,fedora-rawhide-x86_64,fedora-44-aarch64,fedora-44-x86_64,fedora-43-aarch64,fedora-43-x86_64,fedora-42-aarch64,fedora-42-x86_64

jobs:
  detect-changes:
    name: Detect changed package paths
    runs-on: ubuntu-latest
    outputs:
      packages: ${{ steps.matrix.outputs.packages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            anaconda:
              - 'copr/anaconda/**'
            anaconda_webui:
              - 'copr/anaconda-webui/**'
            droid_juicer:
              - 'copr/droid-juicer/**'
            shared:
              - 'packit.yaml'
              - 'scripts/packit-fetch-source.sh'
      - id: matrix
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] || [ "${{ steps.filter.outputs.shared }}" = "true" ]; then
            packages='["anaconda","anaconda-webui","droid-juicer"]'
          else
            packages="$(jq -cn --argjson changes '${{ steps.filter.outputs.changes }}' '
              $changes
              | map(
                  if . == "anaconda_webui" then "anaconda-webui"
                  elif . == "droid_juicer" then "droid-juicer"
                  else .
                  end
                )
            ')"
          fi

          echo "packages=${packages}" >> "$GITHUB_OUTPUT"

  copr-build:
    name: COPR ${{ matrix.package }}
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: needs.detect-changes.outputs.packages != '[]'
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJSON(needs.detect-changes.outputs.packages) }}
    steps:
      - uses: actions/checkout@v4
      - name: Install packit build dependencies
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            gcc \
            python3-dev \
            pkg-config \
            libkrb5-dev \
            libcurl4-openssl-dev \
            libssl-dev
      - name: Install packit CLI
        run: python3 -m pip install --user --break-system-packages packitos
      - name: Configure copr-cli auth
        env:
          COPR_CONFIG: ${{ secrets.COPR_CONFIG }}
        run: |
          test -n "${COPR_CONFIG}"
          mkdir -p "$HOME/.config"
          printf '%s\n' "${COPR_CONFIG}" > "$HOME/.config/copr"
          chmod 600 "$HOME/.config/copr"
      - name: Build ${{ matrix.package }} in COPR
        run: |
          "$HOME/.local/bin/packit" build in-copr \
            --wait \
            --owner samcday \
            --project rokkitpokkit \
            --preserve-project \
            --targets "${COPR_TARGETS}" \
            --additional-repos "copr://samcday/rokkitpokkit" \
            -p "${{ matrix.package }}"
