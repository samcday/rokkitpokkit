on:
  workflow_call:
    outputs:
      compose_manifest_s3:
        description: S3 coordinate for compose manifest
        value: ${{ jobs.build.outputs.compose_manifest_s3 }}
      compose_manifest_url:
        description: Public URL for compose manifest
        value: ${{ jobs.build.outputs.compose_manifest_url }}
      compose_index_s3:
        description: S3 coordinate for compose index
        value: ${{ jobs.build.outputs.compose_index_s3 }}
      compose_index_url:
        description: Public URL for compose index
        value: ${{ jobs.build.outputs.compose_index_url }}
      compose_chunk_prefix_s3:
        description: S3 prefix for casync chunk store
        value: ${{ jobs.build.outputs.compose_chunk_prefix_s3 }}
      compose_chunk_prefix_url:
        description: Public URL prefix for casync chunk store
        value: ${{ jobs.build.outputs.compose_chunk_prefix_url }}
      compose_image_s3:
        description: S3 coordinate for canonical EROFS image
        value: ${{ jobs.build.outputs.compose_image_s3 }}
      compose_image_url:
        description: Public URL for canonical EROFS image
        value: ${{ jobs.build.outputs.compose_image_url }}
      compose_publish_enabled:
        description: Whether compose artifacts were published to object storage
        value: ${{ jobs.build.outputs.compose_publish_enabled }}
      compose_new_chunk_count:
        description: Number of new chunks in this run
        value: ${{ jobs.build.outputs.compose_new_chunk_count }}
      compose_new_chunk_bytes:
        description: Number of new chunk bytes in this run
        value: ${{ jobs.build.outputs.compose_new_chunk_bytes }}
      compose_reused_chunk_count:
        description: Number of reused chunks in this run
        value: ${{ jobs.build.outputs.compose_reused_chunk_count }}
      compose_reused_chunk_bytes:
        description: Number of reused chunk bytes in this run
        value: ${{ jobs.build.outputs.compose_reused_chunk_bytes }}
      compose_erofs_digest:
        description: casync digest for source EROFS image
        value: ${{ jobs.build.outputs.compose_erofs_digest }}
      boot_profile_sha256:
        description: SHA256 for generated boot profile binary artifact
        value: ${{ jobs.build.outputs.boot_profile_sha256 }}
      boot_profile_source_kind:
        description: Rootfs source kind used in generated boot profile
        value: ${{ jobs.build.outputs.boot_profile_source_kind }}
      boot_profile_s3:
        description: S3 coordinate for published boot profile binary
        value: ${{ jobs.build.outputs.boot_profile_s3 }}
      boot_profile_url:
        description: Public URL for published boot profile binary
        value: ${{ jobs.build.outputs.boot_profile_url }}
      boot_profile_stable_pointer_url:
        description: Stable boot profile pointer URL for pushes to main
        value: ${{ jobs.build.outputs.boot_profile_stable_pointer_url }}
      boot_profile_stable_pointer_updated:
        description: Whether stable boot profile pointer was updated in this run
        value: ${{ jobs.build.outputs.boot_profile_stable_pointer_updated }}
      boot_profile_artifact_url:
        description: GitHub artifact URL for compiled boot profile
        value: ${{ jobs.build.outputs.boot_profile_artifact_url }}
      build_artifact_url:
        description: GitHub artifact URL for build output bundle
        value: ${{ jobs.build.outputs.build_artifact_url }}

jobs:
  build:
    runs-on: ubuntu-24.04-arm
    outputs:
      compose_manifest_s3: ${{ steps.compose.outputs.compose_manifest_s3 }}
      compose_manifest_url: ${{ steps.compose.outputs.compose_manifest_url }}
      compose_index_s3: ${{ steps.compose.outputs.compose_index_s3 }}
      compose_index_url: ${{ steps.compose.outputs.compose_index_url }}
      compose_chunk_prefix_s3: ${{ steps.compose.outputs.compose_chunk_prefix_s3 }}
      compose_chunk_prefix_url: ${{ steps.compose.outputs.compose_chunk_prefix_url }}
      compose_image_s3: ${{ steps.compose.outputs.compose_image_s3 }}
      compose_image_url: ${{ steps.compose.outputs.compose_image_url }}
      compose_publish_enabled: ${{ steps.compose.outputs.compose_publish_enabled }}
      compose_new_chunk_count: ${{ steps.compose.outputs.compose_new_chunk_count }}
      compose_new_chunk_bytes: ${{ steps.compose.outputs.compose_new_chunk_bytes }}
      compose_reused_chunk_count: ${{ steps.compose.outputs.compose_reused_chunk_count }}
      compose_reused_chunk_bytes: ${{ steps.compose.outputs.compose_reused_chunk_bytes }}
      compose_erofs_digest: ${{ steps.compose.outputs.compose_erofs_digest }}
      boot_profile_sha256: ${{ steps.boot_profile.outputs.boot_profile_sha256 }}
      boot_profile_source_kind: ${{ steps.boot_profile.outputs.boot_profile_source_kind }}
      boot_profile_s3: ${{ steps.boot_profile.outputs.boot_profile_s3 }}
      boot_profile_url: ${{ steps.boot_profile.outputs.boot_profile_url }}
      boot_profile_stable_pointer_url: ${{ steps.boot_profile.outputs.boot_profile_stable_pointer_url }}
      boot_profile_stable_pointer_updated: ${{ steps.boot_profile.outputs.boot_profile_stable_pointer_updated }}
      boot_profile_artifact_url: ${{ steps.upload_boot_profile_artifact.outputs.artifact-url }}
      build_artifact_url: ${{ steps.upload_build_artifacts.outputs.artifact-url }}

    steps:
      - uses: actions/checkout@v4

      - name: Install packages
        run: |
          sudo apt-get update
          sudo DEBIAN_FRONTEND=noninteractive apt-get install -y \
            erofs-utils \
            systemd-ukify \
            casync \
            curl \
            python3-pip

          if ! command -v aws >/dev/null 2>&1; then
            python3 -m pip install --user --break-system-packages awscli
            echo "$HOME/.local/bin" >> "$GITHUB_PATH"
          fi

      - name: Download fastboop-cli v0.0.1-rc.5
        id: fastboop_cli
        run: |
          FASTBOOP_CLI_VERSION="v0.0.1-rc.5"

          case "${RUNNER_ARCH}" in
            ARM64)
              FASTBOOP_CLI_TARGET="aarch64-unknown-linux-musl"
              FASTBOOP_CLI_SHA256="81582bc1ba3022f6c4a9d80cec4f7375b45e07db9ae1ba63057202601810d047"
              ;;
            X64)
              FASTBOOP_CLI_TARGET="x86_64-unknown-linux-musl"
              FASTBOOP_CLI_SHA256="1e529737b1effa01c5605f5ef9b8fffcb0e8a18cf5f8488980ef3dc62ea4240f"
              ;;
            *)
              echo "unsupported runner architecture for fastboop-cli release asset: ${RUNNER_ARCH}" >&2
              exit 1
              ;;
          esac

          FASTBOOP_CLI_ASSET="fastboop-cli-${FASTBOOP_CLI_TARGET}.tar.gz"
          FASTBOOP_CLI_URL="https://github.com/samcday/fastboop/releases/download/${FASTBOOP_CLI_VERSION}/${FASTBOOP_CLI_ASSET}"
          mkdir -p .fastboop-release
          curl -fsSL --retry 5 --retry-delay 2 --retry-connrefused "${FASTBOOP_CLI_URL}" -o ".fastboop-release/${FASTBOOP_CLI_ASSET}"
          echo "${FASTBOOP_CLI_SHA256}  .fastboop-release/${FASTBOOP_CLI_ASSET}" | sha256sum -c -
          tar -xzf ".fastboop-release/${FASTBOOP_CLI_ASSET}" -C .fastboop-release
          chmod +x .fastboop-release/fastboop
          echo "fastboop_cli_path=${GITHUB_WORKSPACE}/.fastboop-release/fastboop" >> "$GITHUB_OUTPUT"

      - name: Restore casync chunk store cache
        uses: actions/cache@v4
        with:
          path: .casync-cache/store.castr
          key: casync-store-${{ runner.os }}-${{ runner.arch }}-${{ github.repository }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            casync-store-${{ runner.os }}-${{ runner.arch }}-${{ github.repository }}-${{ github.ref_name }}-
            casync-store-${{ runner.os }}-${{ runner.arch }}-${{ github.repository }}-main-

      - uses: systemd/mkosi@v26

      - name: Build image
        run: |
          sudo mkosi -f --profile erofs-lz4,phosh,rawhide,droid-juicer,precompile-akmods,ostree

      - name: Normalize .ero artifact filename
        run: |
          shopt -s nullglob
          ero_files=(./mkosi.output/*.ero)

          if [ "${#ero_files[@]}" -eq 0 ]; then
            echo "No .ero artifact found in ./mkosi.output"
            exit 1
          fi

          source_file="${ero_files[0]}"
          target_file="./mkosi.output/rokkitpokkit.ero"

          if [ "${source_file}" != "${target_file}" ]; then
            cp "${source_file}" "${target_file}"
          fi

      - name: Build compose artifacts and validate casync integrity
        id: compose
        env:
          COMPOSE_ENABLE_PUBLISH: ${{ (github.event_name == 'pull_request' || github.ref == 'refs/heads/main' || github.event_name == 'workflow_dispatch') && secrets.B2_BUCKET != '' && secrets.B2_ACCESS_KEY_ID != '' && secrets.B2_SECRET_ACCESS_KEY != '' && secrets.B2_ENDPOINT_URL != '' }}
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          COMPOSE_BUCKET: ${{ secrets.B2_BUCKET }}
          COMPOSE_ENDPOINT_URL: ${{ secrets.B2_ENDPOINT_URL }}
          COMPOSE_PUBLIC_BASE_URL: https://rokkitpokkit.samcday.com
          COMPOSE_LOCAL_STORE_DIR: .casync-cache/store.castr
          COMPOSE_BASE_LINEAGE_REF: ${{ github.event_name == 'pull_request' && github.base_ref || github.ref_name }}
          COMPOSE_USE_SUDO: 1
        run: ./scripts/casync-compose.sh

      - name: Validate compose manifest shape
        run: |
          python3 - <<'PY'
          import json

          required = {
              "schema_version",
              "kind",
              "build",
              "lineage",
              "artifacts",
              "provenance",
              "publish",
          }

          with open("mkosi.output/compose/compose-manifest.json", "r", encoding="utf-8") as f:
              data = json.load(f)

          missing = sorted(required - set(data))
          if missing:
              raise SystemExit(f"compose-manifest.json missing keys: {missing}")

          if data.get("schema_version") != 1:
              raise SystemExit("compose-manifest.json schema_version must be 1")

          if data.get("kind") != "rokkitpokkit.compose":
              raise SystemExit("compose-manifest.json kind must be rokkitpokkit.compose")
          PY

      - name: Build and publish boot profile channel
        id: boot_profile
        env:
          BOOT_PROFILE_ENABLE_PUBLISH: ${{ steps.compose.outputs.compose_publish_enabled }}
          BOOT_PROFILE_CLI: ${{ steps.fastboop_cli.outputs.fastboop_cli_path }}
          AWS_ACCESS_KEY_ID: ${{ secrets.B2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.B2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          BOOT_PROFILE_BUCKET: ${{ secrets.B2_BUCKET }}
          BOOT_PROFILE_ENDPOINT_URL: ${{ secrets.B2_ENDPOINT_URL }}
          BOOT_PROFILE_PUBLIC_BASE_URL: https://rokkitpokkit.samcday.com
          BOOT_PROFILE_SOURCE_FILE: ./mkosi.output/rokkitpokkit.ero
          BOOT_PROFILE_SOURCE_CASYNC_INDEX: ${{ steps.compose.outputs.compose_index_url }}
          BOOT_PROFILE_SOURCE_CASYNC_CHUNK_STORE: ${{ steps.compose.outputs.compose_chunk_prefix_url }}
        run: ./scripts/bootprofile-channel.sh

      - name: Validate boot profile artifact
        run: |
          "${{ steps.fastboop_cli.outputs.fastboop_cli_path }}" \
            bootprofile show "${{ steps.boot_profile.outputs.boot_profile_path }}" \
            --output /tmp/rokkitpokkit.bootpro.yaml
          test -s /tmp/rokkitpokkit.bootpro.yaml

      - name: Upload build artifacts
        id: upload_build_artifacts
        uses: actions/upload-artifact@v4
        with:
          name: rokkitpokkit
          compression-level: 0
          path: |
            ./mkosi.output/rokkitpokkit.ero
            ./mkosi.output/compose/compose-manifest.json
            ./mkosi.output/compose/*.caibx
            ./mkosi.output/compose/*.sha256
            ./mkosi.output/compose/*.casync-digest
            ./mkosi.output/compose/dedupe-stats.json
            ./mkosi.output/compose/compose-latest-pointer.json
          if-no-files-found: error

      - name: Upload boot profile artifact
        id: upload_boot_profile_artifact
        uses: actions/upload-artifact@v4
        with:
          name: rokkitpokkit-bootpro
          compression-level: 0
          path: ${{ steps.boot_profile.outputs.boot_profile_path }}
          if-no-files-found: error
