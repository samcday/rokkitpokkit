apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: tf-runner
  namespace: rokkitpokkit
rules:
  - apiGroups: [""]
    resources: [secrets]
    resourceNames: [caddy-env]
    verbs: ['*']
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: tf-runner
  namespace: rokkitpokkit
subjects:
  - kind: ServiceAccount
    name: tf-runner
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: tf-runner
