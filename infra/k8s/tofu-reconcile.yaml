apiVersion: infra.contrib.fluxcd.io/v1alpha2
kind: Terraform
metadata:
  name: rokkitpokkit-infra-tofu
  namespace: flux-system
spec:
  interval: 10m
  approvePlan: auto
  path: ./infra/tofu
  sourceRef:
    kind: GitRepository
    name: rokkitpokkit
    namespace: flux-system
  varsFrom:
    - kind: Secret
      name: rokkitpokkit-tofu-auth
      varsKeys:
        - TF_VAR_state_passphrase:state_passphrase
        - TF_VAR_b2_application_key_id:b2_application_key_id
        - TF_VAR_b2_application_key:b2_application_key
  runnerPodTemplate:
    spec:
      env:
        - name: GITHUB_TOKEN
          valueFrom:
            secretKeyRef:
              name: rokkitpokkit-tofu-auth
              key: GITHUB_TOKEN
  writeOutputsToSecret:
    name: rokkitpokkit-tofu-outputs
