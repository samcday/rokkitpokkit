apiVersion: v1
kind: ConfigMap
metadata:
  name: rokkitpokkit-caddy
data:
  Caddyfile: |-
    {
      admin off
      auto_https off
    }

    :80 {
      respond /healthz "ok" 200

      @stable_preflight {
        method OPTIONS
        path /stable
      }
      handle @stable_preflight {
        header {
          Access-Control-Allow-Origin *
          Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
          Access-Control-Allow-Headers "Range, Content-Type, Accept"
          Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range, Content-Type, ETag, Last-Modified"
          Vary Origin
        }
        respond "" 204
      }

      @stable path /stable
      handle @stable {
        header {
          Access-Control-Allow-Origin *
          Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
          Access-Control-Allow-Headers "Range, Content-Type, Accept"
          Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range, Content-Type, ETag, Last-Modified"
          Vary Origin
        }
        redir https://bleeding.fastboop.win/rokkitpokkit/channels/stable.bootpro 302
      }

      respond "🚀📱" 200
    }
