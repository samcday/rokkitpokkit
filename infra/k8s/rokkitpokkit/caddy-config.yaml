apiVersion: v1
kind: ConfigMap
metadata:
  name: rokkitpokkit-caddy
data:
  Caddyfile: |-
    {
      admin off
      auto_https off
    }

    :80 {
      respond /healthz "ok" 200
      redir https://{host}{uri} 308
    }

    :443 {
      tls /certs/tls.crt /certs/tls.key

      respond /healthz "ok" 200
      respond "🚀📱" 200
    }
