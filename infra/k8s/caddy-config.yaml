apiVersion: v1
kind: ConfigMap
metadata:
  name: rokkitpokkit-caddy
  namespace: rokkitpokkit
data:
  B2_PUBLIC_ORIGIN_HOST: f000.backblazeb2.com
  B2_BUCKET: rokkitpokkit
  Caddyfile: |-
    {
      admin off
      auto_https off
    }

    :80 {
      respond /healthz "ok" 200

      @casync_preflight {
        method OPTIONS
        path /casync/*
      }
      handle @casync_preflight {
        header {
          Access-Control-Allow-Origin *
          Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
          Access-Control-Allow-Headers "Range, Content-Type, Accept"
          Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range, Content-Type, ETag, Last-Modified"
          Vary Origin
        }
        respond "" 204
      }

      @casync path /casync/*
      handle @casync {
        header {
          Access-Control-Allow-Origin *
          Access-Control-Allow-Methods "GET, HEAD, OPTIONS"
          Access-Control-Allow-Headers "Range, Content-Type, Accept"
          Access-Control-Expose-Headers "Accept-Ranges, Content-Length, Content-Range, Content-Type, ETag, Last-Modified"
          Vary Origin
        }
        rewrite * /file/{$B2_BUCKET}{uri}
        reverse_proxy https://{$B2_PUBLIC_ORIGIN_HOST}
      }

      @channels path /channels/*
      handle @channels {
        rewrite * /file/{$B2_BUCKET}{uri}
        reverse_proxy https://{$B2_PUBLIC_ORIGIN_HOST}
      }

      @images path /images/*
      handle @images {
        rewrite * /file/{$B2_BUCKET}{uri}
        reverse_proxy https://{$B2_PUBLIC_ORIGIN_HOST}
      }

      @stable path /stable
      handle @stable {
        redir /channels/stable.bootpro 302
      }

      respond "🚀📱" 200
    }
